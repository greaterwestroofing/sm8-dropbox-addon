<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Photos to Dropbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .card { width: 100%; max-width: 420px; border: 1px solid #dde0eb; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .card-header { background: linear-gradient(135deg, #0061FF 0%, #0038b0 100%); color: #fff; padding: 18px 20px; display: flex; align-items: center; gap: 12px; }
    .card-header h1 { font-size: 1rem; font-weight: 600; }
    .card-header p  { font-size: .78rem; opacity: .85; margin-top: 2px; }
    .card-body { padding: 20px; }
    .job-badge { background: #f0f2f8; border: 1px solid #dde0eb; border-radius: 8px; padding: 9px 12px; font-size: .82rem; color: #4a4a6a; margin-bottom: 16px; }
    .job-badge strong { color: #1a1a2e; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0061FF; color: #fff; }
    .btn:hover { opacity: .88; }
    #state-loading, #state-success, #state-empty, #state-error { display: none; }
    .loader { text-align: center; padding: 8px 0; }
    .bar-track { background: #f0f2f8; border-radius: 99px; height: 5px; overflow: hidden; margin: 12px 0 8px; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #0061FF, #00b4d8); border-radius: 99px; animation: slide 1.4s infinite ease-in-out; }
    @keyframes slide { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }
    .loader p { font-size: .82rem; color: #666; }
    #state-success { text-align: center; }
    .tick { font-size: 2.5rem; margin-bottom: 10px; }
    #state-success h2 { font-size: 1rem; margin-bottom: 4px; }
    #state-success p { font-size: .82rem; color: #666; margin-bottom: 14px; }
    .link-box { background: #f0f2f8; border: 1px solid #dde0eb; border-radius: 6px; padding: 10px; font-size: .76rem; color: #0061FF; word-break: break-all; margin-bottom: 12px; text-align:left; }
    .btn-row { display: flex; gap: 8px; }
    .btn-sm { flex:1; padding:10px; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer; border:none; }
    .btn-outline { background:#fff; border:1.5px solid #dde0eb !important; color:#1a1a2e; }
    .btn-blue { background:#0061FF; color:#fff; }
    #state-empty { text-align:center; padding: 8px 0; }
    #state-empty p { font-size:.85rem; color:#666; margin-top:6px; }
    #state-error { background:#fff5f5; border:1px solid #ffd0d0; border-radius:8px; padding:12px; font-size:.83rem; color:#c0392b; }
    #state-error strong { display:block; margin-bottom:4px; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <svg width="32" height="32" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="8" fill="white" fill-opacity="0.15"/><path d="M20 8.5L12 13.5L20 18.5L12 23.5L4 18.5L12 13.5L4 8.5L12 3.5L20 8.5Z" fill="white"/><path d="M20 8.5L28 13.5L20 18.5L28 23.5L36 18.5L28 13.5L36 8.5L28 3.5L20 8.5Z" fill="white"/><path d="M12 25L20 20L28 25L20 30L12 25Z" fill="white"/></svg>
    <div><h1>Send Photos to Dropbox</h1><p>Upload all job photos &amp; get a shareable link</p></div>
  </div>
  <div class="card-body">
    <div class="job-badge">📋 Job: <strong id="job-label">Loading…</strong></div>

    <div id="state-idle">
      <button class="btn btn-primary" onclick="startSync()">☁️ &nbsp;Upload Photos to Dropbox</button>
    </div>

    <div id="state-loading">
      <div class="loader">
        <div>📤 Uploading photos…</div>
        <div class="bar-track"><div class="bar-fill"></div></div>
        <p id="loading-msg">Fetching photos from job diary…</p>
      </div>
    </div>

    <div id="state-success">
      <div class="tick">✅</div>
      <h2 id="success-title"></h2>
      <p id="success-subtitle"></p>
      <div class="link-box" id="link-text"></div>
      <div class="btn-row">
        <button class="btn-sm btn-outline" onclick="openLink()">Open in Dropbox</button>
        <button class="btn-sm btn-blue" id="copy-btn" onclick="copyLink()">Copy Link</button>
      </div>
    </div>

    <div id="state-empty">
      <p>🖼️ No photos found on this job yet.</p>
    </div>

    <div id="state-error">
      <strong>⚠️ Something went wrong</strong>
      <span id="error-msg"></span>
    </div>
  </div>
</div>

<script>
  // Injected by server when JWT is decoded
  var jobUUID  = '__JOB_UUID__';
  var sm8Token = '__SM8_TOKEN__';
  var sharedLink = null;

  // Update job label
  if (jobUUID && jobUUID !== '__JOB_UUID__') {
    document.getElementById('job-label').textContent = jobUUID.slice(0, 8) + '…';
  }

  // Show error immediately if no job data
  if (!jobUUID || jobUUID === '__JOB_UUID__' || !sm8Token || sm8Token === '__SM8_TOKEN__') {
    document.getElementById('error-msg').textContent = 'Missing job or session data. Please close and reopen the action.';
    document.getElementById('state-idle').style.display = 'none';
    document.getElementById('state-error').style.display = 'block';
  }

  function setState(id) {
    ['idle','loading','success','empty','error'].forEach(s => {
      document.getElementById('state-' + s).style.display = 'none';
    });
    document.getElementById('state-' + id).style.display = 'block';
  }

  async function startSync() {
    setState('loading');
    try {
      const res = await fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_uuid: jobUUID, sm8_token: sm8Token }),
      });
      const data = await res.json();
      if (!data.ok) { showError(data.error || 'Unknown error'); return; }
      if (data.jobName) document.getElementById('job-label').textContent = data.jobName;
      if (data.count === 0 || !data.link) { setState('empty'); return; }
      sharedLink = data.link;
      document.getElementById('success-title').textContent = data.count + ' photo' + (data.count !== 1 ? 's' : '') + ' uploaded!';
      document.getElementById('success-subtitle').textContent = 'Folder: ' + (data.jobName || jobUUID.slice(0,8));
      document.getElementById('link-text').textContent = data.link;
      setState('success');
    } catch (err) {
      showError(err.message || 'Network error');
    }
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    setState('error');
  }

  function copyLink() {
    if (!sharedLink) return;
    navigator.clipboard.writeText(sharedLink).then(() => {
      var btn = document.getElementById('copy-btn');
      btn.textContent = '✓ Copied!';
      setTimeout(function(){ btn.textContent = 'Copy Link'; }, 2000);
    });
  }

  function openLink() {
    if (sharedLink) window.open(sharedLink, '_blank');
  }
</script>
</body>
</html>
